<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#15803d" />
  <title>Check-in · Consulta ORL</title>
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/checkin.css" />
</head>
<body>
  <main class="kiosk">
    <!-- Reloj (hora local de Ychoux) -->
    <div id="clock" class="clock" aria-hidden="true">00:00</div>

    <!-- Selector de idioma -->
    <nav class="lang-switch" aria-label="Idioma / Langue / Language">
      <button class="lang-btn" data-lang="es" type="button" aria-pressed="true">ES</button>
      <button class="lang-btn" data-lang="fr" type="button" aria-pressed="false">FR</button>
      <button class="lang-btn" data-lang="en" type="button" aria-pressed="false">EN</button>
    </nav>

    <!-- Vista: formulario de llegada -->
    <section id="form-view" class="card">
      <h1 class="welcome" data-i18n="welcome">BIENVENIDO</h1>
      <p class="instruction" data-i18n="instruction">Por favor, indique sus datos</p>

      <form id="checkin-form" novalidate>
        <label class="field">
          <span class="field-label" data-i18n="lastName">APELLIDO</span>
          <input id="last-name" name="last-name" type="text"
                 autocomplete="off" autocapitalize="characters"
                 inputmode="text" required />
        </label>

        <label class="field">
          <span class="field-label" data-i18n="birthYear">AÑO DE NACIMIENTO</span>
          <input id="birth-year" name="birth-year" type="text"
                 inputmode="numeric" pattern="\d*" maxlength="4"
                 autocomplete="off" required />
        </label>

        <p id="error" class="error" role="alert" hidden></p>

        <button id="submit-btn" class="arrive-btn" type="submit" data-i18n="arrive">HE LLEGADO</button>
      </form>
    </section>

    <!-- Vista: confirmación -->
    <section id="confirm-view" class="card confirm" hidden>
      <div class="check-mark" aria-hidden="true">
        <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
          <circle cx="26" cy="26" r="24" fill="none" />
          <path fill="none" d="M14 27 l8 8 l16 -16" />
        </svg>
      </div>
      <h1 class="confirm-title" data-i18n="confirmTitle">Gracias</h1>
      <p class="confirm-text" data-i18n="confirmText">Le llamaremos en breve.</p>
      <button id="again-btn" class="again-btn" type="button" data-i18n="again">Nuevo paciente</button>
    </section>

    <!-- Vista: posible duplicado -->
    <section id="duplicate-view" class="card" hidden>
      <h1 class="confirm-title" data-i18n="dupTitle">¿Registrarte de nuevo?</h1>
      <p class="confirm-text" data-i18n="dupText">Ya hay un registro reciente con estos datos.</p>
      <button id="dup-already" class="arrive-btn" type="button" data-i18n="dupAlready">No, ya estoy registrado</button>
      <button id="dup-again" class="again-btn" type="button" data-i18n="dupAgain">Sí, registrarme de nuevo</button>
    </section>
  </main>

  <script type="module" src="assets/js/checkin.js"></script>
</body>
</html>
